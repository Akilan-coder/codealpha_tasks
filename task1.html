<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flashcard Quiz App</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f6f9;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:500px;
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    .flashcard{
      background:#fafafa;
      border:2px solid #ddd;
      border-radius:10px;
      padding:30px;
      text-align:center;
      min-height:180px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      margin-bottom:20px;
    }

    .question{
      font-size:22px;
      font-weight:bold;
      margin-bottom:15px;
      color:#222;
    }

    .answer{
      font-size:18px;
      color:#555;
      display:none;
    }

    .buttons{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:15px;
    }

    button{
      padding:10px 15px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-size:15px;
      transition:0.3s;
    }

    button:hover{
      opacity:0.9;
    }

    .primary{
      background:#007bff;
      color:white;
    }

    .success{
      background:#28a745;
      color:white;
    }

    .warning{
      background:#ffc107;
      color:black;
    }

    .danger{
      background:#dc3545;
      color:white;
    }

    .form-group{
      margin-top:15px;
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin-top:5px;
      border:1px solid #ccc;
      border-radius:6px;
    }

    .card-count{
      text-align:center;
      margin-top:10px;
      color:#666;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Flashcard Quiz App</h1>

    <div class="flashcard">
      <div class="question" id="question"></div>
      <div class="answer" id="answer"></div>
    </div>

    <div class="buttons">
      <button class="primary" onclick="showAnswer()">Show Answer</button>
      <button class="success" onclick="prevCard()">Previous</button>
      <button class="success" onclick="nextCard()">Next</button>
    </div>

    <div class="buttons">
      <button class="warning" onclick="editCard()">Edit</button>
      <button class="danger" onclick="deleteCard()">Delete</button>
    </div>

    <div class="card-count" id="cardCount"></div>

    <div class="form-group">
      <input type="text" id="newQuestion" placeholder="Enter Question">
    </div>

    <div class="form-group">
      <textarea id="newAnswer" placeholder="Enter Answer"></textarea>
    </div>

    <div class="buttons">
      <button class="primary" onclick="addCard()">Add Flashcard</button>
    </div>

  </div>

  <script>

    let flashcards = [
      {
        question: "What is HTML?",
        answer: "HTML stands for HyperText Markup Language."
      },
      {
        question: "What is CSS?",
        answer: "CSS is used for styling web pages."
      },
      {
        question: "What is JavaScript?",
        answer: "JavaScript adds interactivity to websites."
      }
    ];

    let currentCard = 0;

    function displayCard() {
      document.getElementById("question").innerText =
        flashcards[currentCard].question;

      document.getElementById("answer").innerText =
        flashcards[currentCard].answer;

      document.getElementById("answer").style.display = "none";

      document.getElementById("cardCount").innerText =
        `Card ${currentCard + 1} of ${flashcards.length}`;
    }

    function showAnswer() {
      document.getElementById("answer").style.display = "block";
    }

    function nextCard() {
      if (currentCard < flashcards.length - 1) {
        currentCard++;
      } else {
        currentCard = 0;
      }

      displayCard();
    }

    function prevCard() {
      if (currentCard > 0) {
        currentCard--;
      } else {
        currentCard = flashcards.length - 1;
      }

      displayCard();
    }

    function addCard() {

      let question =
        document.getElementById("newQuestion").value;

      let answer =
        document.getElementById("newAnswer").value;

      if (question === "" || answer === "") {
        alert("Please enter both question and answer.");
        return;
      }

      flashcards.push({
        question: question,
        answer: answer
      });

      document.getElementById("newQuestion").value = "";
      document.getElementById("newAnswer").value = "";

      currentCard = flashcards.length - 1;

      displayCard();
    }

    function editCard() {

      let updatedQuestion = prompt(
        "Edit Question:",
        flashcards[currentCard].question
      );

      let updatedAnswer = prompt(
        "Edit Answer:",
        flashcards[currentCard].answer
      );

      if (updatedQuestion && updatedAnswer) {

        flashcards[currentCard].question = updatedQuestion;
        flashcards[currentCard].answer = updatedAnswer;

        displayCard();
      }
    }

    function deleteCard() {

      if (flashcards.length === 1) {
        alert("Cannot delete the last flashcard.");
        return;
      }

      flashcards.splice(currentCard, 1);

      if (currentCard >= flashcards.length) {
        currentCard = flashcards.length - 1;
      }

      displayCard();
    }

    displayCard();

  </script>

</body>
</html>
